<div class="container mt-5">
  <h2 class="mb-4">📦 Gestão de Estoque</h2>

  <div class="card shadow-sm mb-5">
    <div class="card-body">
      <h5 class="card-title mb-3">Novo Produto</h5>
      
      <div class="row g-3">
        <div class="col-md-3">
          <label class="form-label">Código</label>
          <input type="text" class="form-control" name="codigo" [(ngModel)]="novoProduto.codigo" placeholder="Ex: PRD-01">
        </div>
        
        <div class="col-md-6">
          <label class="form-label">Descrição</label>
          <input type="text" class="form-control" name="descricao" [(ngModel)]="novoProduto.descricao" placeholder="Nome do produto...">
        </div>
        
        <div class="col-md-3">
          <label class="form-label">Saldo Inicial</label>
          <input type="number" class="form-control" name="saldo" [(ngModel)]="novoProduto.saldo">
        </div>
      </div>

      <div class="mt-4">
        <button type="button" class="btn btn-primary" (click)="salvarProduto()">Cadastrar Produto</button>
      </div>
    </div>
  </div>

  <h4 class="mb-3">Produtos Cadastrados</h4>
  <table class="table table-hover table-bordered">
    <thead class="table-dark">
      <tr>
        <th>Código</th>
        <th>Descrição</th>
        <th>Saldo Disponível</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let prod of produtos">
        <td><strong>{{ prod.codigo }}</strong></td>
        <td>{{ prod.descricao }}</td>
        <td>{{ prod.saldo }} un</td>
      </tr>
      
      <tr *ngIf="produtos.length === 0">
        <td colspan="3" class="text-center text-muted py-4">Nenhum produto cadastrado no estoque ainda.</td>
      </tr>
    </tbody>
  </table>
</div>
